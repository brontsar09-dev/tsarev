<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title data-i18n-key="pageTitle">TSAREV BUY</title>

<style>

body{
margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:white;
font-family:Arial;
}

.lang-switcher{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
align-items:center;
margin-bottom:20px;
}

.lang-btn{
padding:10px 14px;
border:1px solid transparent;
border-radius:999px;
background:#f4f0e5;
color:#333;
font-size:14px;
font-weight:700;
cursor:pointer;
transition:0.2s;
}

.lang-btn.active{
border-color:#000;
background:#fff;
}

h1{
font-size:42px;
margin-bottom:50px;
color:#111;
text-align:center;
max-width:700px;
}

.links{
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:center;
}

.contact-btn{
padding:18px 40px;
border-radius:18px;
background:black;
color:white;
text-decoration:none;
font-size:20px;
font-weight:600;
transition:0.3s;
}

.contact-btn:hover{
transform:scale(1.05);
opacity:0.9;
}
.telegram-btn{
display:flex;
align-items:center;
gap:14px;

padding:18px 34px;

background:#229ED9;
color:white;

text-decoration:none;

border-radius:20px;

font-size:22px;
font-weight:600;

transition:0.3s;
}

.telegram-btn img{
width:34px;
height:34px;
}

.telegram-btn:hover{
transform:scale(1.05);
opacity:0.92;
}

.order-summary{
  width:min(920px, calc(100% - 32px));
  margin:0 auto 24px;
  display:grid;
  gap:12px;
}

.summary-card{
  border:2px solid #e6d9c5;
  border-radius:18px;
  background:#fffaf5;
  padding:16px 18px;
  box-shadow:0 12px 24px rgba(60, 40, 21, 0.08);
}

.summary-card h2{
  margin:0 0 8px;
  font-size:20px;
  color:#271c12;
}

.summary-card p{
  margin:4px 0;
  color:#5b4d3d;
  font-size:16px;
}

.summary-note{
  text-align:center;
  color:#6d5d4d;
  font-size:15px;
  margin-bottom:18px;
}
</style>

</head>

<body>

<div class="lang-switcher">
  <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">🇬🇧 EN</button>
  <button class="lang-btn" data-lang="ru" onclick="setLanguage('ru')">🇷🇺 RU</button>
  <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh')">🇨🇳 中文</button>
  <button class="lang-btn" data-lang="jp" onclick="setLanguage('jp')">🇯🇵 日本</button>
  <button class="lang-btn" data-lang="th" onclick="setLanguage('th')">🇹🇭 ไทย</button>
</div>

<h1 data-i18n-key="selectOrderText">
Select where you want to write for the order.
</h1>

<p class="summary-note" data-i18n-key="summaryNote">Your selected order will appear here before you open Telegram.</p>
<p class="summary-note" data-i18n-key="copyTip">Copy the order summary so you can tell the seller exactly what you want!</p>
<div id="order-summary" class="order-summary"></div>

<div class="links">

<a class="telegram-btn"
href="https://t.me/THETSAREV"
target="_blank">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

<span data-i18n-key="telegramBtn">Telegram</span>

</a>

</div>

<script>
const translations = {
  en: {
    pageTitle: 'TSAREV BUY',
    selectOrderText: 'Select where you want to write for the order.',
    summaryNote: 'Your selected order will appear here before you open Telegram.',
    copyTip: 'Copy the order summary so you can tell the seller exactly what you want!',
    telegramBtn: 'Telegram',
    orderTitle: 'Your order summary',
    flavorLabel: 'Flavor',
    qtyLabel: 'Packs'
  },
  ru: {
    pageTitle: 'TSAREV ПОКУПКА',
    selectOrderText: 'Выберите, куда написать заказ.',
    summaryNote: 'Ваш выбранный заказ будет показан здесь перед Telegram.',
    copyTip: 'Скопируйте сводку заказа, чтобы рассказать продавцу, что именно вы хотите!',
    telegramBtn: 'Телеграм',
    orderTitle: 'Сводка заказа',
    flavorLabel: 'Вкус',
    qtyLabel: 'Пачек'
  },
  zh: {
    pageTitle: 'TSAREV 购买',
    selectOrderText: '选择您想在哪里写订单。',
    summaryNote: '您选中的订单会在打开 Telegram 前显示在这里。',
    copyTip: '复制订单摘要，以便告诉卖家您具体想要什么！',
    telegramBtn: '电报',
    orderTitle: '订单摘要',
    flavorLabel: '口味',
    qtyLabel: '包数'
  },
  jp: {
    pageTitle: 'TSAREV 購入',
    selectOrderText: '注文をどこに書くか選択してください。',
    summaryNote: 'Telegramを開く前に、選択した注文がここに表示されます。',
    copyTip: '注文内容をコピーして、売り手に何を注文したいか伝えましょう！',
    telegramBtn: 'テレグラム',
    orderTitle: '注文内容',
    flavorLabel: 'フレーバー',
    qtyLabel: 'パック数'
  },
  th: {
    pageTitle: 'TSAREV ซื้อ',
    selectOrderText: 'เลือกที่ที่คุณต้องการเขียนคำสั่งซื้อ',
    summaryNote: 'คำสั่งซื้อที่คุณเลือกจะปรากฏที่นี่ก่อนเปิด Telegram',
    copyTip: 'คัดลอกรายการสั่งซื้อเพื่อบอกผู้ขายว่าคุณต้องการอะไร!',
    telegramBtn: 'เทเลแกรม',
    orderTitle: 'สรุปรายการสั่งซื้อ',
    flavorLabel: 'รสชาติ',
    qtyLabel: 'จำนวนห่อ'
  }
};

const productCatalog = {
  mango: { label: 'TSAREV Mango', price: '224 руб.' },
  apple: { label: 'TSAREV Green Apple', price: '299 руб.' }
};

function renderOrderSummary() {
  const container = document.getElementById('order-summary');
  if (!container) return;

  const pending = JSON.parse(localStorage.getItem('tsarevPendingOrder') || 'null');
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const items = pending || cart;
  const lang = localStorage.getItem('tsarevLanguage') || 'en';
  const data = translations[lang] || translations.en;

  if (!items || !items.length) {
    container.innerHTML = '<div class="summary-card"><h2>' + data.orderTitle + '</h2><p>No order selected yet.</p></div>';
    return;
  }

  container.innerHTML = '<div class="summary-card"><h2>' + data.orderTitle + '</h2>' + items.map(item => {
    const product = productCatalog[item.productId] || { label: item.productId };
    const quantity = Number(item.quantity || 1);
    return '<p><strong>' + data.flavorLabel + ':</strong> ' + product.label + '<br><strong>' + data.qtyLabel + ':</strong> ' + quantity + ' packs</p>';
  }).join('') + '</div>';
}

function setLanguage(lang) {
  if (!translations[lang]) {
    lang = 'en';
  }

  const data = translations[lang];
  localStorage.setItem('tsarevLanguage', lang);

  document.querySelectorAll('[data-i18n-key]').forEach(element => {
    const key = element.dataset.i18nKey;
    if (!data[key]) return;
    element.innerText = data[key];
  });

  document.title = data.pageTitle || document.title;

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  renderOrderSummary();
}

function initLanguage() {
  const lang = localStorage.getItem('tsarevLanguage') || 'en';
  setLanguage(lang);
  renderOrderSummary();
}

window.addEventListener('DOMContentLoaded', initLanguage);
</script>

</body>
</html>
