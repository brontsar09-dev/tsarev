<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-key="pageTitle">TSAREV Contacts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#fffaf4 0%, #efe5d7 45%, #f6efe7 100%);color:#2f2419;}
.page-wrap{max-width:980px;margin:0 auto;padding:36px 18px 60px;}
.lang-switcher{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;margin-bottom:18px;}
.lang-btn{padding:10px 14px;border:1px solid transparent;border-radius:999px;background:#f4f0e5;color:#333;font-size:14px;font-weight:700;cursor:pointer;transition:0.2s;}
.lang-btn.active{border-color:#000;background:#fff;}
.card{background:rgba(255,255,255,0.92);border:1px solid rgba(138,92,46,0.15);border-radius:28px;padding:28px;box-shadow:0 18px 45px rgba(0,0,0,0.08);}
.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:#fff4df;color:#8a5c2e;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1.5px;}
h1{font-size:42px;line-height:1.1;color:#6b4f2f;margin:14px 0 10px;}
.lead{font-size:20px;line-height:1.7;color:#5b4d3d;max-width:760px;margin-bottom:18px;}
.contacts-list{display:flex;flex-direction:column;gap:14px;}
.contact-item{background:#fffdf9;border:1px solid #efe3d3;border-radius:18px;padding:16px 18px;font-size:20px;line-height:1.6;color:#3a3027;}
.contact-item strong{color:#8a5c2e;}
.back-btn{display:inline-flex;margin-top:22px;padding:14px 26px;background:#8a5c2e;color:#fff;border:none;border-radius:999px;font-size:17px;font-weight:700;text-decoration:none;transition:0.3s;}
.back-btn:hover{transform:scale(1.02);background:#6f8220;}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">🇬🇧 EN</button>
    <button class="lang-btn" data-lang="ru" onclick="setLanguage('ru')">🇷🇺 RU</button>
    <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh')">🇨🇳 中文</button>
    <button class="lang-btn" data-lang="jp" onclick="setLanguage('jp')">🇯🇵 日本</button>
    <button class="lang-btn" data-lang="th" onclick="setLanguage('th')">🇹🇭 ไทย</button>
  </div>

  <div class="card">
    <span class="eyebrow" data-i18n-key="eyebrow">Social world of TSAREV</span>
    <h1 data-i18n-key="pageTitle">TSAREV Contacts</h1>
    <p class="lead" data-i18n-key="lead">Follow the sweetest side of our world — fresh inspiration, real flavors, and the warmest updates from TSAREV.</p>
    <div class="contacts-list">
      <div class="contact-item"><strong>TikTok:</strong> @thetsarev</div>
      <div class="contact-item"><strong>Telegram channel:</strong> @MARMELADETSAREV</div>
      <div class="contact-item"><strong>Instagram:</strong> @thetsarev</div>
      <div class="contact-item"><strong>TSAREV support:</strong> @THETSAREV</div>
    </div>
    <a class="back-btn" href="index.html" data-i18n-key="backBtn">Back to Store</a>
  </div>
</div>

<script>
const translations = {
  en: {
    pageTitle: 'TSAREV Contacts',
    eyebrow: 'Social world of TSAREV',
    lead: 'Follow the sweetest side of our world — fresh inspiration, real flavors, and the warmest updates from TSAREV.',
    backBtn: 'Back to Store'
  },
  ru: {
    pageTitle: 'Контакты TSAREV',
    eyebrow: 'Соцсети TSAREV',
    lead: 'Следите за самым вкусным из мира TSAREV — свежими идеями, настоящими вкусами и тёплыми новостями.',
    backBtn: 'Назад в магазин'
  },
  zh: {
    pageTitle: 'TSAREV 联系方式',
    eyebrow: 'TSAREV 的社交世界',
    lead: '追随我们最甜蜜的一面——新鲜灵感、真实风味和温暖的更新。',
    backBtn: '返回商店'
  },
  jp: {
    pageTitle: 'TSAREV 連絡先',
    eyebrow: 'TSAREVのソーシャル世界',
    lead: 'TSAREVの sweetest side をフォローしてください — 新鮮なインスピレーション、真実の味、温かい最新情報。',
    backBtn: 'ストアに戻る'
  },
  th: {
    pageTitle: 'ติดต่อ TSAREV',
    eyebrow: 'โลกโซเชียลของ TSAREV',
    lead: 'ติดตามความหวานที่สุดของโลกเรา — แรงบันดาลใจสดใหม่ รสชาติแท้ และข่าวสารอุ่นใจจาก TSAREV',
    backBtn: 'กลับสู่ร้าน'
  }
};

function setLanguage(lang) {
  if (!translations[lang]) lang = 'en';
  const data = translations[lang];
  localStorage.setItem('tsarevLanguage', lang);
  document.querySelectorAll('[data-i18n-key]').forEach(el => {
    const key = el.dataset.i18nKey;
    if (data[key]) el.textContent = data[key];
  });
  document.title = data.pageTitle || document.title;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
}

function initLanguage(){ setLanguage(localStorage.getItem('tsarevLanguage') || 'en'); }
window.addEventListener('DOMContentLoaded', initLanguage);
</script>
</body>
</html>
